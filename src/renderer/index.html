<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://ddragon.leagueoflegends.com; style-src 'self' 'unsafe-inline'" />
  <title>Draft Optimizer</title>
  <style>
    :root {
      --bg: rgba(9, 11, 13, 0.86);
      --panel: rgba(255, 255, 255, 0.03);
      --panel-border: rgba(255, 255, 255, 0.07);
      --text: #e8eef2;
      --dim: #7c8c92;
      --dimmer: #5f6d73;
      --accent: #4fd1c5;
      --accent-glow: rgba(79, 209, 197, 0.35);
      --gold: #d4af6a;
      --bad: #e08a8a;
      --good: #81e6d9;
      --font: -apple-system, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", "Segoe UI Mono", Consolas, "JetBrains Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; height: 100%; overflow: hidden; }
    body {
      font: 12px/1.45 var(--font);
      color: var(--text);
      -webkit-user-select: none;
    }
    #app {
      position: relative;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(180deg, rgba(14,18,24,0.9), var(--bg));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 18px;
      border: 1px solid var(--accent-glow);
      box-shadow: 0 24px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
    }
    #app.shake { animation: justicePunch 0.4s ease-in-out; }

    header {
      flex: none;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--panel-border);
      -webkit-app-region: drag;
    }
    #dot { width: 9px; height: 9px; border-radius: 50%; background: var(--bad); box-shadow: 0 0 8px var(--bad); flex: none; }
    #dot.on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    #statusText { flex: 1; color: var(--dim); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #mode {
      font: 700 10px/1 var(--mono); letter-spacing: 0.08em; color: var(--accent);
      background: rgba(79,209,197,0.12); border: 1px solid rgba(79,209,197,0.25);
      padding: 5px 9px; border-radius: 20px; -webkit-app-region: no-drag;
    }

    main { flex: 1; overflow-y: auto; padding: 14px 18px 20px; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }

    h2 { font: 700 10px/1 var(--mono); text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent); margin: 16px 0 9px; }
    h2:first-child { margin-top: 0; }
    .hint { color: var(--dim); font-size: 11.5px; line-height: 1.6; }

    .bans { display: flex; gap: 22px; font-size: 12px; color: var(--dim); }
    .bans b { color: var(--bad); font-weight: 600; }

    /* --- roster rows (ally/enemy), splash bleed on lock --- */
    .roster { display: flex; flex-direction: column; gap: 7px; }
    .tRow {
      position: relative; overflow: visible; isolation: isolate;
      display: flex; align-items: center; gap: 12px;
      padding: 9px 12px; border-radius: 10px;
      background: var(--panel); border: 1px solid var(--panel-border);
      transition: border-color 0.3s;
    }
    .tRow.locked { border-color: rgba(79,209,197,0.28); }
    .tRow.justPop { animation: lockPop 0.5s ease-out; }
    .tRow .bleed {
      position: absolute; inset: -14px -10px; z-index: -1; border-radius: 16px;
      background-size: cover; background-position: center 22%;
      filter: blur(22px) saturate(1.15) brightness(0.75);
      opacity: 0; transform: scale(1.08);
      transition: opacity 0.9s ease 0.1s;
      -webkit-mask-image: radial-gradient(ellipse at center, #000 45%, transparent 78%);
              mask-image: radial-gradient(ellipse at center, #000 45%, transparent 78%);
    }
    .tRow.locked .bleed { opacity: 0.55; }
    .tRow .role { width: 30px; flex: none; color: var(--dimmer); font: 700 10px/1 var(--mono); letter-spacing: 0.05em; }
    .tRow .portrait {
      width: 40px; height: 40px; border-radius: 9px; flex: none;
      background-size: cover; background-position: center 20%;
      background-color: #171d23; border: 1px solid rgba(255,255,255,0.1);
    }
    .tRow .portrait.locked { border-color: rgba(79,209,197,0.4); box-shadow: 0 0 0 1px rgba(79,209,197,0.15), 0 4px 14px rgba(0,0,0,0.4); }
    .tRow .portrait.empty { background: linear-gradient(145deg,#20262f,#12161c); }
    .tRow .cname { flex: 1; min-width: 0; font: 600 13px/1.3 var(--font); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tRow .cname.pending { color: var(--dimmer); font-weight: 500; }
    .tRow .youTag {
      color: #04211d; background: var(--accent); font: 700 9px/1 var(--mono);
      letter-spacing: 0.05em; padding: 4px 8px; border-radius: 20px; flex: none;
    }

    /* --- pick suggestion cards --- */
    .pick {
      background: var(--panel); border: 1px solid var(--panel-border); border-radius: 13px;
      padding: 13px 15px; margin-bottom: 9px; display: flex; gap: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .pick.metaSource { border-style: dashed; }
    .pick img { width: 44px; height: 44px; border-radius: 10px; flex: none; border: 1px solid rgba(79,209,197,0.25); background: #171d23; }
    .pick .body { flex: 1; min-width: 0; }
    .pick .top { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
    .pick .name { font: 700 14px/1 var(--font); }
    .pick .tier { color: #0a0b0d; background: var(--gold); font: 700 10px/1 var(--mono); padding: 3px 7px; border-radius: 5px; }
    .pick .tag { color: var(--accent); background: rgba(79,209,197,0.1); border: 1px solid rgba(79,209,197,0.25); font: 700 9px/1 var(--mono); letter-spacing: 0.05em; padding: 3px 7px; border-radius: 5px; }
    .pick .wr { color: var(--dim); font: 500 11px/1 var(--mono); margin-left: auto; }
    .pick .reasons { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .pick .reasons span {
      background: rgba(79,209,197,0.08); border: 1px solid rgba(79,209,197,0.2);
      color: #9fe6dd; font: 500 10.5px/1.4 var(--font); padding: 4px 9px; border-radius: 20px;
    }
    .bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); margin-top: 9px; }
    .bar i { display: block; height: 100%; border-radius: 2px; background: linear-gradient(90deg,var(--accent),var(--good)); }

    .runebox, .itembox {
      background: var(--panel); border: 1px solid var(--panel-border); border-radius: 13px;
      padding: 13px 15px; margin-bottom: 10px; position: relative; overflow: visible; isolation: isolate;
    }
    .runebox .bleed, .itembox .bleed {
      position: absolute; inset: -10px; z-index: -1; border-radius: 16px;
      background-size: cover; background-position: center 22%;
      filter: blur(26px) saturate(1.1) brightness(0.7); opacity: 0.4; transform: scale(1.08);
      -webkit-mask-image: radial-gradient(ellipse at center, #000 40%, transparent 80%);
              mask-image: radial-gradient(ellipse at center, #000 40%, transparent 80%);
    }
    .runebox .ks { font: 700 14px/1.3 var(--font); color: var(--gold); }
    .runebox .row, .itembox .row { margin-top: 4px; color: var(--text); font-size: 12px; }
    .note { color: var(--accent); font-size: 11.5px; margin-top: 6px; }
    .sit { margin-top: 5px; font-size: 12px; }
    .sit b { color: var(--gold); font-weight: 600; }
    .sit span { color: var(--dim); }
    .src { color: var(--dimmer); font: 500 10px/1 var(--mono); margin-top: 7px; }

    footer {
      flex: none; padding: 10px 18px; border-top: 1px solid var(--panel-border);
      color: var(--dimmer); font: 500 10.5px/1 var(--mono); display: flex; gap: 16px;
    }
    kbd { background: rgba(255,255,255,0.08); border-radius: 4px; padding: 2px 6px; }

    /* --- lock-in "Demacian Justice" effect: beam + flash + shockwave --- */
    #fxLayer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 80; }
    .executeFx .beam {
      position: absolute; width: 6px; margin-left: -3px;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, #fff9e6 12%, #ffe9a8 40%, var(--gold) 75%, rgba(212,175,106,0) 100%);
      box-shadow: 0 0 14px 3px rgba(255,232,170,0.85), 0 0 40px 10px rgba(212,175,106,0.5);
      transform-origin: top center; border-radius: 3px;
      animation: beamDrop 0.55s cubic-bezier(.2,.9,.25,1) forwards;
    }
    .executeFx.big .beam { width: 10px; margin-left: -5px; }
    .executeFx .flash {
      position: absolute; width: 180px; height: 180px; margin: -90px 0 0 -90px; border-radius: 50%; opacity: 0;
      background: radial-gradient(circle, rgba(255,244,214,0.9) 0%, rgba(212,175,106,0.35) 45%, rgba(212,175,106,0) 72%);
      animation: beamFlash 0.5s ease-out 0.42s forwards;
    }
    .executeFx.big .flash { width: 340px; height: 340px; margin: -170px 0 0 -170px; }
    .executeFx .ring {
      position: absolute; width: 10px; height: 10px; margin: -5px 0 0 -5px; border-radius: 50%; opacity: 0;
      border: 3px solid var(--gold); box-shadow: 0 0 18px rgba(212,175,106,0.6);
      animation: shockRing 0.65s ease-out 0.44s forwards;
    }
    .executeFx .ring2 { animation-delay: 0.5s; border-color: #fff2cf; }
    .executeFx.big .ring, .executeFx.big .ring2 { border-width: 5px; }

    @keyframes beamDrop { 0% { transform: scaleY(0); opacity: 0; } 10% { opacity: 1; } 45% { transform: scaleY(1); opacity: 1; } 70% { opacity: 0.7; } 100% { transform: scaleY(1); opacity: 0; } }
    @keyframes beamFlash { 0% { opacity: 0; transform: scale(0.4); } 35% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.3); } }
    @keyframes shockRing { 0% { opacity: 0.9; transform: scale(0.1); } 60% { opacity: 0.5; } 100% { opacity: 0; transform: scale(18); } }
    @keyframes lockPop { 0% { transform: scale(0.94); } 45% { transform: scale(1.015); } 100% { transform: scale(1); } }
    @keyframes justicePunch { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="fxLayer"></div>
    <header>
      <div id="dot"></div>
      <div id="statusText">Starting…</div>
      <div id="mode">ghost</div>
    </header>
    <main id="main">
      <p class="hint">Launch the League client and enter champ select — recommendations appear here automatically. Edit <code>data/profile.json</code> to set your champion pool.</p>
    </main>
    <footer><kbd>⌘⇧O</kbd> interact / click-through &nbsp; <kbd>⌘⇧H</kbd> hide</footer>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
